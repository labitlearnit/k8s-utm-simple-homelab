---
mac_ssh_config_marker: "# K8s Simple Homelab"

# Network prefix (must match vm-provision role)
network_prefix: "192.168.64"

# Hosts to add to Mac /etc/hosts (vault + jump needed from Mac)
mac_hosts_entries: |
  {{ network_prefix }}.11  vault
  {{ network_prefix }}.12  jump

jump_host_ip: "{{ network_prefix }}.12"
ssh_key_private: "{{ ansible_env.HOME }}/.ssh/k8slab.key"
