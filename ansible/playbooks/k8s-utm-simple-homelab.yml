---
# =============================================================================
# K8s Simple Homelab - Full Cluster Deployment Playbook
# =============================================================================
# Fully automated end-to-end deployment of a simple (non-HA) K8s cluster.
#
# Usage (run from Mac host):
#   cd ~/k8s-utm-simple-homelab/ansible
#   ansible-playbook -i inventory/localhost.yml playbooks/k8s-utm-simple-homelab.yml --ask-become-pass
#
# Architecture:
#   Mac connects ONLY to jump (bastion). All cluster VMs are managed
#   from the jump server using ansible-playbook over SSH.
#
# Cluster:
#   1 x jump (bastion), 1 x vault, 1 x etcd, 1 x master, 2 x workers
#
# Timeline:
#   ┌─ create VMs + start ─┐
#   │  ┌─ mac-setup ────────┤ (overlapped while VMs boot)
#   │  ├─ download bins ────┤ (downloads in parallel, overlapped)
#   │  └─ wait jump SSH ────┘
#   ├─ jump-setup + copy bins + wait ansible ─┐
#   ├─ vault-full-setup ──────────────────────┤
#   ├─ k8s-certs (all nodes) ────────────────┤
#   ├─ etcd (single node) ───────────────────┤
#   ├─ control-plane (single master) ────────┤
#   ├─ workers (2 workers) ──────────────────┤
#   └─ calico CNI ───────────────────────────┘
# =============================================================================

# =============================================================================
# Phase 1: Mac Localhost - Provision Infrastructure
# =============================================================================

# -----------------------------------------------------------------------------
# Step 1: Create + start VMs
# -----------------------------------------------------------------------------
- name: "Phase 1: Create and start UTM VMs"
  hosts: localhost
  connection: local
  gather_facts: true

  roles:
    - role: ../roles/vm-provision

# -----------------------------------------------------------------------------
# Step 2-3: Mac setup + download binaries while VMs boot
# -----------------------------------------------------------------------------
- name: "Phase 1: Mac setup + download binaries (while VMs boot)"
  hosts: localhost
  connection: local
  gather_facts: true

  roles:
    - role: ../roles/mac-setup
    - role: ../roles/download-binaries

# -----------------------------------------------------------------------------
# Step 4: Wait for jump server SSH
# -----------------------------------------------------------------------------
- name: "Phase 1: Wait for jump server SSH"
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Wait for jump server SSH to be reachable
      ansible.builtin.wait_for:
        host: 192.168.64.12
        port: 22
        timeout: 600
        delay: 10

# =============================================================================
# Phase 2: Configure Jump Server (Mac → jump only)
# =============================================================================

- name: "Phase 2: Configure jump server + copy binaries"
  hosts: jump_servers
  gather_facts: true
  vars_files:
    - ../roles/download-binaries/vars/main.yml

  roles:
    - role: ../roles/jump-setup

  tasks:
    - name: Include binary copy tasks
      ansible.builtin.include_tasks: ../roles/download-binaries/tasks/copy_to_jump.yml

    - name: Wait for ansible-playbook to be available (cloud-init)
      ansible.builtin.command:
        cmd: which ansible-playbook
      register: ansible_check
      retries: 24
      delay: 5
      until: ansible_check.rc == 0
      changed_when: false

    - name: Jump server fully ready
      ansible.builtin.debug:
        msg: "Jump configured, binaries copied, ansible available"

# =============================================================================
# Phase 3: Deploy K8s Cluster (ALL playbooks run ON the jump server)
# =============================================================================

- name: "Phase 3: Deploy cluster from jump server"
  hosts: jump_servers
  gather_facts: false
  vars:
    ansible_dir: ~/k8s-utm-simple-homelab/ansible
    playbook_cmd: "cd {{ ansible_dir }} && ansible-playbook -i inventory/"

  tasks:
    # --- Step 6: Vault Full Setup (bootstrap + PKI) ---
    - name: "Step 6: Run vault-full-setup.yml on jump"
      ansible.builtin.shell: |
        {{ playbook_cmd }} playbooks/vault-full-setup.yml
      args:
        creates: "{{ ansible_dir }}/.vault-credentials/vault-init.json"
      register: vault_setup

    - name: Display vault setup result
      ansible.builtin.debug:
        msg: "{{ vault_setup.stdout_lines[-5:] }}"
      when: vault_setup is changed

    # --- Step 7: Issue & deploy K8s certificates ---
    - name: "Step 7: Run k8s-certs.yml on jump"
      ansible.builtin.shell: |
        {{ playbook_cmd }} playbooks/k8s-certs.yml
      register: certs_result

    - name: Display certs result
      ansible.builtin.debug:
        msg: "{{ certs_result.stdout_lines[-3:] }}"

    # --- Step 8: Deploy etcd (single node) ---
    - name: "Step 8: Run etcd-cluster.yml on jump"
      ansible.builtin.shell: |
        {{ playbook_cmd }} playbooks/etcd-cluster.yml
      register: etcd_result

    - name: Display etcd result
      ansible.builtin.debug:
        msg: "{{ etcd_result.stdout_lines[-5:] }}"

    # --- Step 8.5: Store etcd encryption key in Vault ---
    - name: "Step 8.5: Run vault-etcd-encryption-key.yml on jump"
      ansible.builtin.shell: |
        {{ playbook_cmd }} playbooks/vault-etcd-encryption-key.yml
      register: enc_key_result

    - name: Display encryption key result
      ansible.builtin.debug:
        msg: "{{ enc_key_result.stdout_lines[-3:] }}"

    # --- Step 9: Deploy Control Plane (single master) ---
    - name: "Step 9: Run control-plane.yml on jump"
      ansible.builtin.shell: |
        {{ playbook_cmd }} playbooks/control-plane.yml
      register: cp_result

    - name: Display control plane result
      ansible.builtin.debug:
        msg: "{{ cp_result.stdout_lines[-3:] }}"

    # --- Step 10: Deploy Worker Nodes (2 workers) ---
    - name: "Step 10: Run worker.yml on jump"
      ansible.builtin.shell: |
        {{ playbook_cmd }} playbooks/worker.yml
      register: worker_result

    - name: Display worker result
      ansible.builtin.debug:
        msg: "{{ worker_result.stdout_lines[-5:] }}"

    # --- Step 11: Install Calico CNI ---
    - name: "Step 11: Patch Calico manifest for pod CIDR"
      ansible.builtin.shell: |
        sed -i 's|# - name: CALICO_IPV4POOL_CIDR|- name: CALICO_IPV4POOL_CIDR|; s|#   value: "192.168.0.0/16"|  value: "10.244.0.0/16"|' /tmp/calico.yaml
      changed_when: true

    - name: "Step 11: Apply Calico CNI"
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/calico.yaml
      register: calico_apply
      changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"

    - name: Wait for Calico to initialize
      ansible.builtin.pause:
        seconds: 30

    - name: Get cluster nodes
      ansible.builtin.command:
        cmd: kubectl get nodes -o wide
      register: node_list
      retries: 5
      delay: 10
      until: node_list.rc == 0
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: node_list.stdout_lines

# =============================================================================
# Final Summary
# =============================================================================
- name: "Deployment Complete"
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Show deployment summary
      ansible.builtin.debug:
        msg: |
          
          ════════════════════════════════════════════════════════════
          K8s Simple Homelab Deployment Complete!
          ════════════════════════════════════════════════════════════
          
          Infrastructure:
            Vault:          192.168.64.11 (UI: http://192.168.64.11:8200)
            Jump/Bastion:   192.168.64.12
          
          etcd:
            etcd-1:         192.168.64.21
          
          Control Plane:
            master-1:       192.168.64.31
          
          Workers:
            worker-1:       192.168.64.41
            worker-2:       192.168.64.42
          
          Access:
            SSH to jump:    ssh jump
            From jump:      ssh master-1, ssh worker-1, etc.
            kubectl:        ssh jump && kubectl get nodes
          
          Vault:
            Address:        http://vault:8200
            Unseal:         ssh jump && vault-unseal
